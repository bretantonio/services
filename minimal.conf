# ==========================================
# 1. Class Declarations  (bare names only)
# ==========================================
class process
class file
class dir
class filesystem

# ==========================================
# 2. Initial SID Declarations
# ==========================================
sid kernel
sid unlabeled

# ==========================================
# 3. Access Vectors
#    Grammar: classes -> initial_sids -> access_vectors -> opt_mls -> te_rbac -> users -> sid_contexts
#    common blocks must come BEFORE the class permission sets that inherit from them.
#    The entire access_vectors section must come AFTER initial_sids.
# ==========================================
common file_perms { read write getattr setattr create unlink }

class process { fork execmem sigchld sigkill sigstop }
class file inherits file_perms { execute }
class dir inherits file_perms { search add_name remove_name }
class filesystem { getattr mount remount unmount }

# ==========================================
# 4. (opt_mls omitted — no -M flag used)
# ==========================================

# ==========================================
# 5. te_rbac  (types, roles, allow rules)
#    type before role so the role can reference them.
#    "unlabeled_t" avoids a name clash with the SID "unlabeled".
# ==========================================
type init_t;
type unlabeled_t;

role object_r types { init_t unlabeled_t };

allow init_t unlabeled_t:process *;
allow init_t unlabeled_t:file *;
allow init_t unlabeled_t:dir *;
allow init_t unlabeled_t:filesystem *;

# ==========================================
# 6. Users  (separate section after te_rbac)
# ==========================================
user system_u roles { object_r };

# ==========================================
# 7. SID Context Mappings  (initial_sid_contexts)
#    Must come last, after all type/role/user declarations.
#    No MLS level suffix because MLS is not enabled.
# ==========================================
sid kernel   system_u:object_r:init_t
sid unlabeled system_u:object_r:unlabeled_t

